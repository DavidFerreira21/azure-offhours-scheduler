[tool.ruff]
line-length = 120
target-version = "py312"
src = ["src", "tests", "function"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.per-file-ignores]
"function/OffHoursTimer/__init__.py" = ["E402"]
