name: Bug report
description: Report a defect or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, config, or table entities when relevant
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: Python version, Azure Functions runtime, deploy mode, subscriptions, etc.
