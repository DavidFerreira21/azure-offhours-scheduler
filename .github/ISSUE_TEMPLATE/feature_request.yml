name: Feature request
description: Propose an enhancement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or design
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain who benefits and any runtime/deploy implications
